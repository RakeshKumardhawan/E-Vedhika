<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="metal-ev" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="glow-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="center-depth">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="1"/>
    </radialGradient>
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
      .spin { transform-origin: center; animation: spin 4s linear infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <circle cx="32" cy="32" r="30" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  
  <path d="M50 16 A24 24 0 1 0 50 48" fill="none" stroke="url(#glow-ring)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <path d="M50 16 A24 24 0 1 0 50 48" fill="none" stroke="#fff" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.4"/>

  <circle cx="32" cy="32" r="18" fill="url(#center-depth)" stroke="#1e40af" stroke-width="1"/>
  
  <text x="32" y="34.5" text-anchor="middle" dominant-baseline="middle" fill="url(#metal-ev)" font-size="16" font-weight="900" font-family="system-ui, sans-serif" letter-spacing="-1">EV</text>
  
  <circle cx="32" cy="32" r="28" fill="none" stroke="#38bdf8" stroke-width="0.5" stroke-dasharray="10 100" class="spin"/>
  <circle cx="50" cy="16" r="2" fill="#fff" class="pulse"/>
  <circle cx="50" cy="48" r="2" fill="#fff" class="pulse"/>
</svg>
